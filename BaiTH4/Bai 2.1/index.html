<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./static/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.9/jquery.validate.min.js" type="text/javascript"></script>
</head>
<body>
    <div class="container">
        <h1>Đăng ký tài khoản</h1>

        <form class="form" method="get" id="sign-in">
            <div class="row">
                <label for="nameInput" id="nameLabel">Họ và tên: </label>
                <input type="text" class="input" id="nameInput" name="nameInput">
            </div>
            <div class="row">
                <label for="emailInput" id="emailLabel">Email: </label>
                <input type="text" class="input" id="emailInput" name="emailInput">
            </div>
            <div class="row">
                <label for="phoneInput" id="phoneLabel">Số điện thoại: </label>
                <input type="text" class="input" id="phoneInput" name="phoneInput">
            </div>
            <div class="row">
                <label for="pwInput" id="pwLabel">Password: </label>
                <input type="password" class="input" id="pwInput" name="pwInput">
            </div>
            <div class="row">
                <label for="repwInput" id="repwLabel">Re-password: </label>
                <input type="password" class="input" id="repwInput" name="repwInput">
            </div>
            <div>
                <label for="genderInput" id="genderLabel">Giới tính: </label>
                <div id="genderInput">
                    <label for="male">Nam</label>
                    <input type="radio" name="genderInput" id="male"><br>
                    <label for="female">Nữ</label>
                    <input type="radio" name="genderInput" id="female">
                </div>
            </div>
            <div>
                <label for="policyInput" id="policyLabel">Điều khoản: </label>
                <input type="checkbox" name="policyInput" id="policyInput">
            </div>
            <div class="row">
                <input type="submit" class="submit-btn" id="submitBtn" value="Đăng ký">
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./main.js"></script>
</body>
</html>
